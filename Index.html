<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Acumen — Invest Smarter. Collect Better.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060810;
    color: #EEF4FF;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 500px; }
  .logo { font-size: 48px; font-weight: 900; letter-spacing: 5px; margin-bottom: 8px; line-height: 1; }
  .logo span { color: #F5B800; }
  .tag { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 4px; color: #4A6070; text-transform: uppercase; margin-bottom: 40px; display: block; }
  .coming { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px; color: #2A3A4A; text-transform: uppercase; margin-bottom: 32px; }
  .form { display: flex; gap: 8px; max-width: 380px; margin: 0 auto 16px; }
  .form input { flex: 1; padding: 12px 14px; background: #111820; border: 1px solid #1E2A38; border-radius: 6px; color: #EEF4FF; font-size: 14px; outline: none; }
  .form input::placeholder { color: #2A3A50; }
  .form button { padding: 12px 20px; background: #F5B800; color: #060810; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; white-space: nowrap; }
  .sub { font-size: 11px; color: #2A3A50; font-family: 'Courier New', monospace; letter-spacing: 1px; }
  .diamond { width: 40px; height: 40px; background: transparent; border: 2px solid #F5B800; transform: rotate(45deg); margin: 0 auto 32px; opacity: 0.4; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="diamond"></div>
    <div class="logo">CARD<span>ACUMEN</span></div>
    <span class="tag">Invest Smarter. Collect Better.</span>
    <div class="coming">// Launching soon</div>
    <div class="form">
      <input type="email" placeholder="your@email.com" />
      <button>NOTIFY ME</button>
    </div>
    <div class="sub">Weekly buy/sell/hold picks for serious card investors.</div>
  </div>
</body>
</html>
