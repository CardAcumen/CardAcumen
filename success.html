<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Acumen — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #f5f0e8;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 520px;
      padding: 40px 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.1s forwards;
    }
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(212, 175, 55, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .check-circle svg {
      width: 32px;
      height: 32px;
      stroke: #d4af37;
      fill: none;
      stroke-width: 2.5;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: rgba(245, 240, 232, 0.55);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      padding: 14px 40px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      background: #d4af37;
      color: #0d0d0d;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.25s;
    }
    .btn:hover {
      background: #e8c547;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>You're In</h1>
    <p>Your Card Acumen subscription is active. You now have access to premium prospect intelligence, card market alerts, and dynasty fantasy analysis.</p>
    <a href="/" class="btn">GO TO DASHBOARD</a>
  </div>
</body>
</html>
